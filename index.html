<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Image Gallery</h1>

<div class="gallery">
    <img src="https://picsum.photos/id/1015/300/200" alt="Image 1" onclick="openLightbox(0)">
    <img src="https://picsum.photos/id/1016/300/200" alt="Image 2" onclick="openLightbox(1)">
    <img src="https://picsum.photos/id/1018/300/200" alt="Image 3" onclick="openLightbox(2)">
    <img src="https://picsum.photos/id/1025/300/200" alt="Image 4" onclick="openLightbox(3)">
</div>

<div id="lightbox" class="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <button class="prev" onclick="changeImage(-1)">❮</button>
    <img id="lightbox-img">
    <button class="next" onclick="changeImage(1)">❯</button>
</div>

<script src="script.js"></script>

</body>
</html>
